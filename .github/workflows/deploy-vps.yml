name: Deploy API to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: api-deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH and run deploy script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 12m
          script_stop: true
          script: |
            cd C:\app\goal-slot-api && git fetch --all && git reset --hard origin/main && powershell -NoProfile -ExecutionPolicy Bypass -File C:\app\goal-slot-api\scripts\deploy.ps1
